name: Build extension artifacts

# On a version tag (e.g. v1.0.9), build the runtime-loadable extension bundle and attach it (+ the
# index.json catalog) to the GitHub Release, so Nekuva's "Update extensions" can download it WITHOUT
# an app rebuild. JitPack still builds the compile-time dependency from the same tag independently —
# this only adds the runtime artifacts.
#
# Step 2 (current): Desktop jar only. Step 3 will add the Android (dexed) artifact + signing.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  extension:
    name: Extension bundle (Desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build plugin artifacts
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew assemblePluginArtifacts -PpluginVersion="$VERSION"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            build/plugin/nekuva-ext-desktop.jar
            build/plugin/index.json
