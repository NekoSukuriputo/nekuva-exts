name: Build extension artifacts

# On a version tag (e.g. v1.0.9), build the runtime-loadable extension bundle and attach it (+ the
# index.json catalog) to the GitHub Release, so Nekuva's "Update extensions" can download it WITHOUT
# an app rebuild. JitPack still builds the compile-time dependency from the same tag independently —
# this only adds the runtime artifacts.
#
# Produces: Desktop jar (JVM .class), Android jar (dexed via d8), and index.json listing both + sha256.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the Release first with curated notes + a commit changelog, so the build job only ATTACHES files
  # and never overwrites the body (mirrors the nekuva app's release workflow).
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so we can diff against the previous tag
      # Build the release body: a curated intro + a COMMIT list (subject + short SHA + @author) for every
      # commit since the previous tag, a Contributors list, and the compare link. GitHub's
      # generate_release_notes is PR-based; this repo commits straight to main, so we list commits via the
      # compare API (which also resolves each commit's GitHub @login) instead.
      - name: Build release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          NEW="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          cat > release_notes.md <<'INTRO'
          Runtime **extension bundle** (manga sources) for the Nekuva reader.

          These are the parsers from `nekuva-exts`, packaged so Nekuva can update its sources **without a full
          app rebuild** — open Nekuva → **Settings → About → Update extensions** to download the latest bundle.

          ## Assets
          - `nekuva-ext-desktop.jar` — Desktop (JVM) bundle.
          - `nekuva-ext-android.jar` — Android bundle (dexed with d8, `--min-api 24`).
          - `index.json` — catalog the app reads (version + per-platform sha256). `index.json.sig` — its RSA signature.

          > Imported/updated bundles are verified against Nekuva's embedded public key before loading.
          INTRO
          {
            echo
            if [ -n "$PREV" ]; then
              gh api "repos/${GITHUB_REPOSITORY}/compare/${PREV}...${NEW}" > compare.json
              echo "## What's Changed"
              jq -r '.commits[] | "* " + (.commit.message | split("\n")[0]) + " [`" + .sha[0:7] + "`](" + .html_url + ") " + (if .author then "@" + .author.login else .commit.author.name end)' compare.json
              echo
              echo "## Contributors"
              jq -r '[.commits[] | if .author then "@" + .author.login else .commit.author.name end] | unique | .[] | "* " + .' compare.json
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${NEW}"
            else
              echo "## What's Changed"
              git log --pretty="format:* %s [\`%h\`](https://github.com/${GITHUB_REPOSITORY}/commit/%H) %an"
              echo
            fi
          } >> release_notes.md
          echo "----- generated release notes -----"
          cat release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: nekuva-exts ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          body_path: release_notes.md

  extension:
    name: Extension bundle (Desktop + Android)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build Desktop jar + stage deps
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew assemblePluginArtifacts stagePluginDeps -PpluginVersion="$VERSION"
      - name: Dex bundle for Android (d8)
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          ANDROID_JAR="$(ls -d "$SDK"/platforms/android-* | sort -V | tail -1)/android.jar"
          D8="$(ls "$SDK"/build-tools/*/d8 | sort -V | tail -1)"
          echo "d8=$D8"
          echo "android.jar=$ANDROID_JAR"
          # deps are classpath-only (resolution) — they are NOT included in the dex; the host provides them.
          CP_ARGS=()
          for j in build/plugin/deps/*.jar; do CP_ARGS+=(--classpath "$j"); done
          # --min-api must match the app's minSdk (24).
          "$D8" --release --min-api 24 --lib "$ANDROID_JAR" "${CP_ARGS[@]}" \
            --output build/plugin/nekuva-ext-android.jar \
            build/plugin/nekuva-ext-desktop.jar
      - name: Write catalog (index.json)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DSHA="$(sha256sum build/plugin/nekuva-ext-desktop.jar | cut -d' ' -f1)"
          ASHA="$(sha256sum build/plugin/nekuva-ext-android.jar | cut -d' ' -f1)"
          # abiVersion must match nekuva-exts NekuvaExtensions.ABI_VERSION + the build's extAbiVersion.
          cat > build/plugin/index.json <<JSON
          {
            "abiVersion": 1,
            "version": "$VERSION",
            "artifacts": {
              "desktop": { "file": "nekuva-ext-desktop.jar", "sha256": "$DSHA" },
              "android": { "file": "nekuva-ext-android.jar", "sha256": "$ASHA" }
            }
          }
          JSON
          cat build/plugin/index.json
      - name: Sign catalog (index.json.sig)
        env:
          # RSA private key (PEM) — generate once, add as a repo secret. The app embeds the matching
          # public key and rejects bundles whose index.json signature doesn't verify. Absent → empty sig
          # (the app accepts it only while its public key is still unset).
          EXT_SIGNING_KEY: ${{ secrets.EXT_SIGNING_KEY }}
        run: |
          if [ -n "$EXT_SIGNING_KEY" ]; then
            printf '%s' "$EXT_SIGNING_KEY" > /tmp/ext_key.pem
            openssl dgst -sha256 -sign /tmp/ext_key.pem build/plugin/index.json | base64 -w0 > build/plugin/index.json.sig
            rm -f /tmp/ext_key.pem
            echo "index.json signed."
          else
            : > build/plugin/index.json.sig
            echo "No EXT_SIGNING_KEY secret — wrote empty signature."
          fi
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            build/plugin/nekuva-ext-desktop.jar
            build/plugin/nekuva-ext-android.jar
            build/plugin/index.json
            build/plugin/index.json.sig
